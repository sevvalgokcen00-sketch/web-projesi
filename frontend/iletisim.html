    <script>
        function dogrulaNative() {
            const isim = document.getElementById('isim').value.trim();
            const email = document.getElementById('email').value.trim();
            const telefon = document.getElementById('telefon').value.trim();
            const mesaj = document.getElementById('mesaj').value.trim();


            if (isim === "" || email === "" || telefon === "" || mesaj === "") {
                alert("Native JS Uyarısı: Lütfen tüm alanları doldurunuz!");
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                alert("Native JS Uyarısı: Lütfen geçerli bir e-mail adresi giriniz!");
                return;
            }

            const rakamKontrol = /^[0-9]+$/;
            if (!rakamKontrol.test(telefon)) {
                alert("Native JS Uyarısı: Telefon numarası sadece rakamlardan oluşmalıdır!");
                return;
            }

            document.getElementById('iletisimFormu').submit();
        }
    </script>

    <script>
        const { createApp } = Vue;

        createApp({
            methods: {
                dogrulaVue() {
                    const isim = this.$refs.isim.value.trim();
                    const email = this.$refs.email.value.trim();
                    const telefon = this.$refs.telefon.value.trim();
                    const mesaj = this.$refs.mesaj.value.trim();

                    if (isim === "" || email === "" || telefon === "" || mesaj === "") {
                        alert("Vue.js Uyarısı: Lütfen tüm zorunlu alanları doldurun!");
                        return;
                    }

                    if (!email.includes('@') || !email.includes('.')) {
                        alert("Vue.js Uyarısı: Geçersiz e-mail formatı tespit edildi.");
                        return;
                    }

                    const rakamKontrol = /^[0-9]+$/;
                    if (!rakamKontrol.test(telefon)) {
                        alert("Vue.js Uyarısı: Telefon alanına harf giremezsiniz, sadece rakam!");
                        return;
                    }

                    this.$refs.form.submit();
                }
            }
        }).mount('#app');
    </script>
