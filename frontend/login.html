<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - Şevval Gökçen</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex flex-col min-h-screen">

    <header class="bg-indigo-600 text-white shadow-md">
        <div class="max-w-5xl mx-auto px-4 py-5 flex flex-col md:flex-row justify-between items-center">
            <div class="text-center md:text-left mb-4 md:mb-0">
                <h1 class="text-2xl font-bold">Şevval Gökçen</h1>
            </div>
            <nav>
                <ul class="flex flex-wrap justify-center md:justify-end gap-4 font-medium text-sm md:text-base">
                    <li><a href="giris.html" class="hover:text-indigo-300 transition">Hakkımda</a></li>
                    <li><a href="cv.html" class="hover:text-indigo-300 transition">CV</a></li>
                    <li><a href="sehrimsayfası.html" class="hover:text-indigo-300 transition">Şehrim</a></li>
                    <li><a href="kulturelmiras.html" class="hover:text-indigo-300 transition">Mirasımız</a></li>
                    <li><a href="ilgi-alanlarim.html" class="hover:text-indigo-300 transition">İlgi Alanlarım</a></li>
                    <li><a href="iletisim.html" class="hover:text-indigo-300 transition">İletişim</a></li>
                    <li><a href="login.html" class="hover:text-indigo-300 transition font-bold border-b-2 border-indigo-200">Giriş Yap</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full border-t-4 border-indigo-600">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-indigo-800">Öğrenci Girişi</h2>
            </div>

            <div id="hataMesaji" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-6">
                <span class="block sm:inline">Bilgiler hatalı! Lütfen tekrar deneyin.</span>
            </div>

            <form action="login.php" method="POST" onsubmit="return jsKontrolYap()">
                <div class="mb-5">
                    <label class="block text-gray-700 font-bold mb-2">E-posta</label>
                    <input type="text" id="email" name="email" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="b251210023@sakarya.edu.tr">
                </div>
                <div class="mb-8">
                    <label class="block text-gray-700 font-bold mb-2">Şifre</label>
                    <input type="password" id="sifre" name="sifre" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="b251210023">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-md transition-all">
                    Giriş Yap
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-gray-800 text-white text-center py-6 mt-auto">
        <p>&copy; 2026 Şevval Gökçen - Web Teknolojileri Projesi</p>
    </footer>

    <script>
        if (new URLSearchParams(window.location.search).has('hata')) {
            document.getElementById('hataMesaji').classList.remove('hidden');
        }

        function jsKontrolYap() {
            const email = document.getElementById('email').value.trim();
            const sifre = document.getElementById('sifre').value.trim();
            const emailFormat = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (email === "" || sifre === "") {
                alert("Alanlar boş bırakılamaz!");
                return false; 
            }
            if (!emailFormat.test(email)) {
                alert("E-posta formatı hatalı!");
                return false; 
            }
            return true;
        }
    </script>
</body>
</html>
