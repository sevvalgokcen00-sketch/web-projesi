<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hakkımda - Şevval Gökçen</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <header class="bg-indigo-600 text-white text-center py-6 shadow-md">
        <h1 class="text-3xl font-bold">Şevval Gökçen</h1>
        <p class="text-lg mt-2">Kişisel Web Sayfası</p>
    </header>

    <main class="max-w-4xl mx-auto my-8 p-4">
        
        <section class="bg-white rounded-xl shadow-md p-6 mb-8 flex flex-col md:flex-row items-center gap-8">
            <div class="flex-shrink-0">
                <img src="resimler/kendi-fotografim.jpg" alt="Şevval Gökçen Profil Fotoğrafı" class="w-48 h-48 rounded-full object-cover border-4 border-indigo-100 bg-gray-200">
            </div>
            <div>
                <h2 class="text-2xl font-semibold mb-4 text-indigo-700">Hakkımda</h2>
                <p class="mb-2 text-lg">Merhaba, ben <strong>Şevval Gökçen</strong>.</p>
               <p class="mb-2 text-lg">Mardinliyim </p>  
               <p class="mb-2 text-lg"><strong>Sakarya Üniversitesi Bilgisayar Mühendisliği 1. Sınıf</strong> öğrencisiyim.</p>
            </div>
        </section>

        <section class="bg-white rounded-xl shadow-md p-6">
            <h2 class="text-2xl font-semibold mb-6 text-indigo-700 text-center">Hobilerim ve İlgi Alanlarım</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <article class="border rounded-lg overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                    <img src="resimler/yuruyus-foto.jpg" alt="Yürüyüş Yapmak" class="w-full h-40 object-cover bg-gray-200">
                    <div class="p-4 text-center">
                        <h3 class="font-medium text-lg">Yürüyüş Yapmak</h3>
                    </div>
                </article>

                <article class="border rounded-lg overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                    <img src="resimler/muzik-foto.jpg" alt="Müzik Dinlemek" class="w-full h-40 object-cover bg-gray-200">
                    <div class="p-4 text-center">
                        <h3 class="font-medium text-lg">Müzik Dinlemek</h3>
                    </div>
                </article>

                <article class="border rounded-lg overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                    <img src="resimler/kesif-foto.jpg" alt="Yeni Yerler Keşfetmek" class="w-full h-40 object-cover bg-gray-200">
                    <div class="p-4 text-center">
                        <h3 class="font-medium text-lg">Yeni Yerler Keşfetmek</h3>
                    </div>
                </article>

            </div>
        </section>

    </main>

    <footer class="bg-gray-800 text-white text-center py-4 mt-8">
        <p>&copy; 2026 Şevval Gökçen.</p>
    </footer>

</body>
</html>
